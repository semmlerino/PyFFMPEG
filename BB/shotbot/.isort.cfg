[settings]
line_length = 100
multi_line_output = 3
include_trailing_comma = true
force_grid_wrap = 0
use_parentheses = true
ensure_newline_before_comments = true
sections = FUTURE,STDLIB,THIRDPARTY,FIRSTPARTY,LOCALFOLDER
default_section = THIRDPARTY
known_third_party = PySide6,pytest,PIL,numpy,OpenEXR
known_first_party = shotbot,cache,launcher,controllers,tests
skip = venv,test_venv,venv_py311,__pycache__,.git
skip_glob = **/venv/*,**/test_venv/*,**/venv_py311/*
import_heading_stdlib = Standard library imports
import_heading_thirdparty = Third-party imports
import_heading_firstparty = Local application imports
profile = black