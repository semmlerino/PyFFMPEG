[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = 
    -v
    --strict-markers
    --tb=short
    -p no:xvfb
    -p no:xdist
    --timeout=60
    --timeout-method=thread
    --ignore=tests/unit/test_utils.py
    --ignore=tests/unit/test_exr_performance.py
    --ignore=tests/unit/test_shot_model.py
markers =
    unit: Unit tests
    integration: Integration tests
    slow: Slow running tests
    gui: GUI tests requiring display
    performance: Performance regression tests
