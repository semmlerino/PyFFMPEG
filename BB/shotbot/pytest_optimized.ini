[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = 
    -v
    --strict-markers
    --tb=short
    -p no:xvfb
    -p no:xdist
    --timeout=30
    --timeout-method=thread
    --ignore=tests/unit/test_utils.py
    --ignore=tests/unit/test_exr_performance.py
    --ignore=tests/unit/test_exr_parametrized.py
    --ignore=tests/unit/test_exr_edge_cases.py
    --ignore=tests/unit/test_utils_extended.py
    --ignore=tests/unit/test_shot_model.py
    --ignore=tests/unit/test_threede_scene_worker.py
    --ignore=tests/unit/test_shot_item_model.py
    --ignore=tests/unit/test_threede_shot_grid.py
    --ignore=tests/unit/test_thread_safe_worker.py
    --ignore=tests/unit/test_shot_info_panel.py
markers =
    unit: Unit tests
    integration: Integration tests
