[pytest]
# Optimized pytest configuration for WSL environment
# Reduces filesystem operations to improve performance

testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Minimal output and reduced I/O
addopts = 
    --tb=short
    -p no:cacheprovider
    -p no:stepwise
    -p no:warnings
    --no-header
    --no-summary
    -q

# Disable plugins that cause excessive I/O
disable_plugins = 
    cacheprovider
    stepwise
    warnings

# Fast markers for quick testing
markers =
    fast: Fast tests that should run in <100ms
    unit: Unit tests
    slow: Slow tests (skip with -m "not slow")
    qt: Tests requiring Qt
    integration: Integration tests
    critical: Critical path tests that must pass

# Reduce collection time
python_ignore = 
    tests/performance/*
    tests/stress/*
    tests/benchmark/*