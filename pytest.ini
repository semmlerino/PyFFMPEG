[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    --verbose
    --tb=short
    --cov=.
    --cov-report=term-missing:skip-covered
    --cov-report=html:coverage_html
    -p no:rerunfailures
    -p no:xvfb
    # Serial mode for Qt stability in WSL
    # Qt tests require serial execution to avoid Qt C++ initialization crashes
    # For faster testing: run non-Qt tests with -n 2, Qt tests serially
    # -n 2
    # --dist=worksteal
    --timeout=10
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
markers =
    unit: Unit tests
    integration: Integration tests
    qt: Tests requiring Qt GUI
    hardware: Tests requiring specific hardware
    slow: Tests that take a long time to run