# Serena project configuration for PyFFMPEG
language: python

# Use gitignore to filter files
ignore_all_files_in_gitignore: true

# Additional paths to ignore
ignored_paths:
  - venv/**
  - .venv/**
  - test_venv/**
  - __pycache__/**
  - "*.pyc"
  - htmlcov/**
  - .pytest_cache/**
  - .hypothesis/**
  - .ruff_cache/**
  - coverage_html/**
  - "*.egg-info/**"
  - BB/**
  - encoded_releases/**
  - "encoded_app_*.txt"

# Not read-only - allow editing
read_only: false

# No excluded tools
excluded_tools: []

# Project name
project_name: "PyFFMPEG"
